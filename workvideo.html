<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Video</title>
    <!-- সুন্দর ফন্টের জন্য Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* বেসিক সেটআপ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0f172a; /* আগের পেজের সাথে মিল রেখে ডার্ক ব্যাকগ্রাউন্ড */
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* কন্টেইনার স্টাইল */
        section {
            width: 100%;
            max-width: 700px;
            text-align: center;
            background: rgba(30, 41, 59, 0.5); /* হালকা গ্লাস ইফেক্ট */
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 25px;
        }

        /* মেইন হেডিং (সবুজ গ্লোয়িং টেক্সট) */
        h1 {
            font-size: 2.2rem;
            color: #00ff40;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(0, 255, 64, 0.4);
        }

        /* সাব-হেডিং (অরেঞ্জ গ্লোয়িং টেক্সট) */
        h2 {
            font-size: 1.4rem;
            color: #ff4800;
            font-weight: 600;
            margin-bottom: 25px;
            text-shadow: 0 0 15px rgba(255, 72, 0, 0.4);
        }

        /* ভিডিও প্লেয়ারের আকর্ষণীয় লুক */
        video {
            width: 100%;
            max-height: 400px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.1);
            outline: none;
            background-color: #000;
        }

        /* ব্যাক বাটনটিকে একদম প্রিমিয়াম করা হয়েছে */
        .btn-back {
            display: inline-block;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            color: #0f172a;
            background: #00d2ff; /* নিয়ন ব্লু ব্যাকগ্রাউন্ড */
            padding: 12px 40px;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
        }

        /* বাটনের হোভার ইফেক্ট */
        .btn-back:hover {
            background: #fff;
            color: #0f172a;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.6);
        }

        /* মোবাইলের জন্য রেসপন্সিভ */
        @media (max-width: 500px) {
            h1 { font-size: 1.6rem; }
            h2 { font-size: 1.1rem; }
            section { padding: 15px; }
        }
    </style>
</head>
<body>

    <section>
        <h1>Dako vai kmon houcga</h1>
        <h2>I love you jan ame tomak kube 🐦‍🔥 Fhaaaaaaaaaaaaaaaaaaa</h2>
        <video controls src="video/work1.mp4"></video>
    </section>

    <!-- ব্যাক বাটন -->
    <a class="btn-back" href="index.html">Back</a>
    
</body>
</html>
